name: Deploy - AWS Fargate

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_project_name: ${{ vars.AWS_PROJECT_NAME }}
      TF_VAR_environment: ${{ vars.AWS_ENVIRONMENT }}
      TF_VAR_db_password: ${{ secrets.AWS_DB_PASSWORD }}
      TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ./aws
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ./aws
        run: |
          terraform apply -auto-approve -input=false \
            -var="aws_region=${AWS_REGION:-us-east-1}" \
            -var="project_name=${TF_VAR_project_name:-sus-blockchain}" \
            -var="environment=${TF_VAR_environment:-prod}" \
            -var="db_password=${TF_VAR_db_password}" \
            -var="secret_key=${TF_VAR_secret_key}"

      - name: Export Terraform outputs
        working-directory: ./aws
        run: |
          echo "API_ECR=$(terraform output -raw api_ecr_repository_url)" >> $GITHUB_ENV
          echo "FRONTEND_ECR=$(terraform output -raw frontend_ecr_repository_url)" >> $GITHUB_ENV
          echo "API_URL=$(terraform output -raw api_url)" >> $GITHUB_ENV
          echo "ECS_CLUSTER=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_ENV
          echo "API_SERVICE=$(terraform output -raw api_service_name)" >> $GITHUB_ENV
          echo "FRONTEND_SERVICE=$(terraform output -raw frontend_service_name)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build -t $API_ECR:latest ./backend
          docker push $API_ECR:latest

      - name: Build and push Frontend image
        run: |
          docker build --build-arg VITE_API_URL=$API_URL -t $FRONTEND_ECR:latest ./frontend
          docker push $FRONTEND_ECR:latest

      - name: Force ECS redeploy
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $API_SERVICE --force-new-deployment
          aws ecs update-service --cluster $ECS_CLUSTER --service $FRONTEND_SERVICE --force-new-deployment
